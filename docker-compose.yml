services:
  db:
    image: postgres:16

    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - pgdata:/var/lib/postgresql/data

    ports:
      - '5432:5432'

  app:
    build: .

    restart: always

    ports:
      - '8080:8080'

    environment:
      DB_HOST: db
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      NODE_ENV: production

    depends_on:
      - db

    volumes:
      - ./uploads:/app/uploads

volumes:
  pgdata:
