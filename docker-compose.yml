services:
  db:
    image: postgres:16

    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - pgdata:/var/lib/postgresql/data

    ports:
      - '5432:5432'

  app:
    build: .

    restart: always

    ports:
      - '8080:8080'

    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}

    depends_on:
      - db

volumes:
  pgdata:
